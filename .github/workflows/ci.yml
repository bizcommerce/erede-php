name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      # Libraries do not commit a lock file, so resolve fresh on every run.
      - name: Install dependencies
        run: composer update --prefer-dist --no-progress

      - name: Run tests
        run: vendor/bin/phpunit

      - name: Security audit
        if: matrix.php == '8.3'
        run: composer audit

  static-analysis:
    name: Static analysis (PHPStan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  code-style:
    name: Code style (PSR-12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress

      - name: Check coding standard
        run: vendor/bin/phpcs

  php81-lint:
    name: PHP 8.1 syntax compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # PHPUnit 11 cannot install on PHP 8.1, so this job skips Composer entirely and
      # only lints the source to prove it still parses on the advertised floor.
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none

      - name: Lint sources
        run: find src -name '*.php' -print0 | xargs -0 -n1 -P4 php -l
